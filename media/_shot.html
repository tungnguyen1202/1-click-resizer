<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>1-Click Resizer</title>
  <link rel="stylesheet" href="../com.oneclickresize.panel/css/style.css" />
  <style>
    /* Hero render only: pin the demo to a narrow panel width so headless
       Chrome renders it fully (its layout viewport otherwise defaults wide). */
    html, body { background: #0E100F; margin: 0; }
    .wrap { width: 404px; min-height: 0; padding: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel" role="region" aria-label="1-Click Resizer panel">
      <div id="main-view">
        <div class="top">
          <div class="brand">
            <span class="spark" aria-hidden="true">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
            </span>
            1-CLICK RESIZER
          </div>
          <div class="ver">RSZ-A17F<br><b>V1.7.9</b></div>
        </div>

        <div class="pills">
          <span class="pill ok"><span class="dot"></span>ENGINE OK</span>
          <span class="pill ok"><span class="dot"></span>SEQUENCE OPEN</span>
        </div>

        <div class="divider"></div>

        <div class="sect">
          <p class="label">Nguồn nhận diện</p>
          <div class="source">
            <div class="rt">
              <span class="ratiobox r916" aria-hidden="true"></span>
              <div class="meta"><b>9 : 16</b><span>1080 × 1920 · 30fps</span></div>
            </div>
            <div class="srcright">
              <button class="iconbtn" type="button">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
              </button>
              <span class="autobadge">AUTO</span>
            </div>
          </div>
        </div>

        <div class="btnwrap">
          <button class="resize">RESIZE
            <span class="sub">tạo tất cả ratio còn lại</span>
          </button>
        </div>

        <div class="outputs">
          <div class="orow show"><span class="oico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg></span><div class="oinfo"><b>Brand vid17.0 4x5</b><span>4 : 5 · đã canh 1 lớp</span></div><span class="ostatus"><span class="dot"></span>DONE</span></div>
          <div class="orow show"><span class="oico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg></span><div class="oinfo"><b>Brand vid17.0 1x1</b><span>1 : 1 · đã canh 1 lớp</span></div><span class="ostatus"><span class="dot"></span>DONE</span></div>
        </div>
        <div class="hint">2 phiên bản đã được tạo</div>

        <div class="foot">
          <div class="tools">
            <span class="tbtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          </div>
          <span class="ai"><span class="dot"></span>READY</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
